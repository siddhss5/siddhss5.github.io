name: Build and Deploy Jekyll Site

on:
  push:
    branches: [ main, minimal-mistakes ]
  pull_request:
    branches: [ main, minimal-mistakes ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
      
    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.1'
        bundler-cache: true
        
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"
        
    - name: Install Python dependencies
      run: |
        uv pip install --system -r requirements.txt
        
    - name: Generate site data
      env:
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      run: |
        # Update CV from submodule to assets
        uv run python scripts/update_cv.py
        
        # Generate publications and projects
        uv run python scripts/generate_publications.py
        
        # Generate awards from CV data
        uv run python scripts/generate_awards.py
        
        # Generate mentoring data from CV data
        uv run python scripts/generate_mentoring.py
        
        # Generate press data from CV data
        uv run python scripts/generate_press.py
        
        # Generate videos (only if API key is available)
        if [ -n "$YOUTUBE_API_KEY" ]; then
          uv run python scripts/generate_videos.py
        else
          echo "⚠️  No YouTube API key found, skipping videos generation"
        fi
        
    - name: Build Jekyll site
      run: |
        bundle exec jekyll build
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: jekyll-site
        path: _site/
        
  deploy:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/minimal-mistakes'
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
      
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: jekyll-site
        path: _site/
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3.9.3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./_site
