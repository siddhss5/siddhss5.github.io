    Presented at the SCI Forum November 8, 2023


    Eating is a personal and intricate task that we perform every day. However, approximately
    1.8 million people in the US alone cannot eat without assistance. In this presentation,
    Taylor Kessler Faulkner, Ph.D., Postdoctoral Scholar in the Paul G. Allen Center
    for Computer Science & Engineering at the University of Washington, will discuss
    the current state of robot-assisted feeding and the continuing research being
    done at UW in the Personal Robotics Lab (PRL), led by Prof. Siddhartha Srinivasa.
    She will discuss advances in both the autonomous robotics and the human-robot
    interaction components of assistive feeding, as well as discussing promising future
    research avenues.'
