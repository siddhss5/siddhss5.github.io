robotfeeding:
  title: Robot-Assisted Feeding
  description: Our work in robot-assisted feeding focuses on enabling autonomous,
    safe, and comfortable bite acquisition and delivery for individuals with motor
    impairments. Our system ADA (Assistive Dexterous Arm) integrates compliant control,
    multimodal perception, and learned food interaction policies to handle the diversity
    of everyday meals. We study the fundamental problems of manipulation under uncertainty
    while advancing assistive robotics for real-world impact.
