- channel_title: Personal Robotics Lab
  description: "Herb is a robot from the Intel Personal Robotics Lab and a research\
    \ platform for Carnegie Mellon's Quality of Life Technology Research Center. \
    \ During Intel Pittsburgh's 2010 open house, Herb greeted guests by demonstrating\
    \ his abilities to pick up different bottles and cans, travel while avoiding obstacles,\
    \ offer the object to someone and then put it back or in a recycle bin.  During\
    \ the video you can see how the arm is able to be manipulated by someone and then\
    \ it resumes doing the task it was doing.  Herb's computer vision - his view of\
    \ the world in data point clouds - was on display too being projected for all\
    \ to see.\r\n\r\nTo learn more visit these links:\r\nhttp://personalrobotics.intel-research.net/projects/herb.php\r\
    \n\r\nhttp://www.cmu.edu/qolt/"
