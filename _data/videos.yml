- channel_title: Personal Robotics Lab
  description: At the Personal Robotics Lab at Carnegie Mellon's Robotics Institute,
    we have been developing the Assistive Dexterous Arm (ADA) in collaboration with
    the Rehabilitation Institute in Chicago. ADA is built upon the joystick controlled
    assistive robot arm MICO manufactured by Kinova Robotics. We augment the arm with
    multi-modal perception and world modeling capabilities, in-house developed state-of-the-art
    motion planning algorithms, and a sliding autonomy based novel control and decision
    making framework. The grand vision of the project is to have ADA continuously
    learn about the daily routines of the users as well as their personalities and
    preferences while accumulating perception, manipulation, and task execution experience.
