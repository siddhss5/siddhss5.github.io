name: Build and Deploy Site

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.1'
        bundler-cache: true
        working-directory: site

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install labdata
      run: |
        pip install git+https://github.com/siddhss5/labdata.git

    - name: Sync config from lab.yaml
      run: |
        python scripts/sync_config.py

    - name: Generate site data with labdata
      run: |
        labdata --config lab.yaml --output site/_data/lab.yml

    - name: Build Jekyll site
      run: |
        cd site
        bundle exec jekyll build

    - name: Deploy to GitHub Pages
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./site/_site
        publish_branch: gh-pages
        cname: goodrobot.ai
