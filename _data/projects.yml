interventions:
  title: Learning from Interventions
  description: We study how human interventions, like resets, corrections, and implicit
    signals, among others, can serve as a principled source of structure for safe
    and efficient robot learning. By interpreting interventions as defining support
    sets of safe and high-value states, we design algorithms that provably accelerate
    convergence while bounding suboptimality. This framework extends to learning intervention
    models directly from observation, allowing agents to autonomously infer when to
    reset, request help, or modify their behavior. Our broader goal is to establish
    a unified foundation for learning under human guidance, where safety, efficiency,
    and adaptability emerge naturally from the dynamics of interaction.
  website: ''
  status: active
  publications:
  - title: 'Expert Intervention Learning: An online framework for robot learning from
      explicit and implicit human feedback'
    authors: J. Spencer, S. Choudhury, M. Barnes, M. Schmittle, M. Chiang, P. Ramadge,
      and S. Srinivasa
