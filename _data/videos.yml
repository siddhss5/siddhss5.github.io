  description: 'See the longer video for more details: https://www.youtube.com/watch?v=SyTuuUbTFVU


    Not All Who Wander Are Lost: A Localization-Free System for In-The-Wild Mobile
    Robot Deployments

    Amal Nanavati, Nick Walker, Lee Taber, Christoforos Mavrogiannis, Leila Takayama,
    Maya Cakmak, Siddhartha Srinivasa


    HRI 2022


    Abstract

    It is difficult to run long-term in-the-wild studies with mobile robots. This
    is partly because the robots we, as human-robot interaction (HRI) researchers,
    are interested in deploying prioritize expressivity over navigational capabilities,
    and making those robots autonomous is often not the focus of our research. One
    way to address these difficulties is with the Wizard of Oz (WoZ) methodology,
    where a researcher teleoperates the robot during its deployment. However, the
    constant attention required for teleoperation limits the duration of WoZ deployments,
    which in-turn reduces the amount of in-the-wild data we are able to collect. Our
    key insight is that several types of in-the-wild mobile robot studies can be run
    without autonomous navigation, using wandering instead. In this paper we present
    and share code for our wandering robot system, which enabled Kuri, an expressive
    robot with limited sensor and computational capabilities, to traverse the hallways
    of a 28,000 ft^2 floor for four days. Our system relies on informed direction
    selection to avoid obstacles and traverse the space, and periodic human help to
    charge. After presenting the outcomes from the four-day deployment, we then discuss
    the benefits of deploying a wandering robot, explore the types of in-the-wild
    studies that can be run with wandering robots, and share pointers for enabling
    other robots to wander. Our goal is to add wandering to the toolbox of navigation
    approaches HRI researchers use, particularly to run in-the-wild deployments with
    mobile robots.'
