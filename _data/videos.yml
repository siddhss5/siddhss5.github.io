  description: "Speaker:  Ethan Gordon, PhD Candidate, Personal Robotics Lab and Computer\
    \ Science and Engineering, University of Washington\n \nTitle: Tractably Adaptable\
    \ Food Manipulation for Robot-Assisted Feeding\n\nIntroduction by: Brenna Argall,\
    \ Associate Professor of Mechanical Engineering, Computer Science, and Physical\
    \ Medicine & Rehabilitation at Shirley Ryan AbilityLab and Center for Robotics\
    \ and Biosystems\n \nDate and Time: Wednesday, November 1, 11:00 AM CT\n \nLocation:\
    \  Zoom\n\nAbstract:\nAssistive robots can empower those with mobility impairments,\
    \ engendering feelings of independence. However, to reach the point of actual\
    \ in-home use, they must manage the trade-off between adaptability, tractability,\
    \ and comfort. On one hand is the non-stationary distribution of the environment\
    \ and user preferences; a robot may need to explore to find the best action to\
    \ take. On the other hand, excessive exploration can make for an uncomfortable\
    \ experience of failures and unpredictable motion. This is particularly salient\
    \ for intimate tasks like feeding. In this talk, we focus on the particular problem\
    \ of food acquisition, with metrics, system design, and assumptions informed by\
    \ studies with people with upper spinal cord injuries. The problem can be mapped\
    \ into the well-studied contextual bandit framework to enable online adaptation\
    \ with theoretical guarantees on performance, though these scale with the size\
    \ of both the context space (which can be large, set by the variety of food users\
    \ may want) and the action space. We show how we can leverage haptic information\
    \ and human expertise to shrink both of these spaces, making this online adaptation\
    \ tractable. Within the next year, we expect this work to culminate in a system\
    \ that can be deployed in a user’s home for an extended period of time.\n \nBio:\n\
    Ethan Gordon is a PhD Candidate in the Personal Robotics Lab at the University\
    \ of Washington, advised by Prof. Siddhartha Srinivasa. He holds a B.S.E. degree\
    \ in Electrical Engineering and Engineering Physics from Princeton University,\
    \ where he studied the control of neuromorphic silicon photonics under Prof. Paul\
    \ Prucnal. Previously, he has worked at Oculus VR designing variable focus displays\
    \ for prescription correction and the Honda Research Institute working on in-hand\
    \ tool manipulation. Ethan’s research interests include physics-based robot manipulation\
    \ and online learning, especially with applications in human-robot interaction\
    \ and assistive robotics. He is a full-stack roboticist who is passionate about\
    \ building end-to-end systems such as ADA, the Assistive Dexterous Arm, used for\
    \ robot-assisted feeding of those with upper-body mobility impairments."
