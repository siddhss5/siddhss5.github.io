    full-stack robotics system which not only can support our own research and teaching
    demands, but those of the community at-large. The acronym MuSHR is inspired by
    dog-sled racing, “mushing”, where dogs (most commonly Alaskan Huskies) work together
    pull a sled. As the UW mascot is the Husky, we found this name especially fitting.
