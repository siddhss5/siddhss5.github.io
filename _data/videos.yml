  title: Convergent Planning
- channel_title: Personal Robotics Lab
  description: "Our human-robot collaboration research aims to\nimprove the fluency\
    \ and efficiency of interactions between\nhumans and robots when executing a set\
    \ of tasks in a shared\nworkspace. During human-robot collaboration, a robot and\n\
    a user must often complete a disjoint set of tasks that use\nan overlapping set\
    \ of objects, without using the same object\nsimultaneously. A key challenge is\
    \ deciding what task the robot\nshould perform next in order to facilitate fluent\
    \ and efficient\ncollaboration. Most prior work does so by first predicting the\n\
    human’s intended goal, and then selecting actions given that\ngoal. However, it\
    \ is often difficult, and sometimes impossible,\nto infer the human’s exact goal\
    \ in real time, and this serial\npredict-then-act method is not adaptive to changes\
    \ in human\ngoals. In this paper, we present a system for inferring a probability\n\
    distribution over human goals, and producing assistance\nactions given that distribution\
    \ in real time. The aim is to\nminimize the disruption caused by the nature of\
    \ human-robot\nshared workspace. We extend recent work utilizing Partially\nObservable\
    \ Markov Decision Processes (POMDPs) for shared\nautonomy in order to provide\
    \ assistance without knowing\nthe exact goal. We evaluate our system in a study\
    \ with 28\nparticipants, and show that our POMDP model outperforms\nstate of the\
    \ art predict-then-act models by producing fewer\nhuman-robot collisions and less\
    \ human idling time. \n\nIROS 2016 - Human-Robot SharedWorkspace Collaboration\
    \ via Hindsight Optimization"
