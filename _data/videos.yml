  description: 'Is More Autonomy Always Better?: Exploring Preferences of Users with
    Mobility Impairments in Robot-assisted Feeding

    Tapomayukh Bhattacharjee, Ethan K. Gordon, Rosario Scalise, Maria E. Cabrera,
    Anat Caspi, Maya Cakmak, Siddhartha S. Srinivasa


    HRI''20: ACM/IEEE International Conference on Human-Robot Interaction

    Session: Health and Wellness


    Abstract

    A robot-assisted feeding system can potentially help a user with upper-body mobility
    impairments eat independently. However, autonomous assistance in the real world
    is challenging because of varying user preferences, impairment constraints, and
    possibility of errors in uncertain and unstructured environments. An autonomous
    robot-assisted feeding system needs to decide the appropriate strategy to acquire
    a bite of hard-to-model deformable food items, the right time to bring the bite
    close to the mouth, and the appropriate strategy to transfer the bite easily.
    Our key insight is that a system should be designed based on a user''s preference
    about these various challenging aspects of the task. In this work, we explore
    user preferences for different modes of autonomy given perceived error risks and
    also analyze the effect of input modalities on technology acceptance. We found
    that more autonomy is not always better, as participants did not have a preference
    to use a robot with partial autonomy over a robot with low autonomy. In addition,
    participants'' user interface preference changes from voice control during individual
    dining to web-based during social dining. Finally, we found differences on average
    ratings when grouping the participants based on their mobility limitations (lower
    vs. higher) that suggests that ratings from participants with lower mobility limitations
    are correlated with higher expectations of robot performance.


    DOI:: https://doi.org/10.1145/3319502.3374818

    WEB:: https://humanrobotinteraction.org/2020/


    Talk for the ACM/IEEE International Conference on Human-Robot Interaction 2020'
