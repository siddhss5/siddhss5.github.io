name: Check for CV and Publications updates

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check-updates:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Check for CV and Publications updates
      run: |
        echo "🔍 Checking for updates to CV and Publications..."
        
        # Check CV updates
        echo "📄 Checking CV updates..."
        CV_CURRENT_HASH=$(git submodule status _data/cv_data | cut -d' ' -f1)
        git submodule update --remote _data/cv_data
        CV_NEW_HASH=$(git submodule status _data/cv_data | cut -d' ' -f1)
        
        # Check Publications updates
        echo "📚 Checking Publications updates..."
        PUBS_CURRENT_HASH=$(git submodule status _data/pubs | cut -d' ' -f1)
        git submodule update --remote _data/pubs
        PUBS_NEW_HASH=$(git submodule status _data/pubs | cut -d' ' -f1)
        
        # Check if any updates were found
        UPDATES_FOUND=false
        COMMIT_MESSAGE="Auto-update from submodules:"
        
        if [ "$CV_CURRENT_HASH" != "$CV_NEW_HASH" ]; then
          echo "✅ CV has been updated! (${CV_NEW_HASH:0:7})"
          git add _data/cv_data
          COMMIT_MESSAGE="$COMMIT_MESSAGE CV(${CV_NEW_HASH:0:7})"
          UPDATES_FOUND=true
        else
          echo "ℹ️  No CV updates found."
        fi
        
        if [ "$PUBS_CURRENT_HASH" != "$PUBS_NEW_HASH" ]; then
          echo "✅ Publications have been updated! (${PUBS_NEW_HASH:0:7})"
          git add _data/pubs
          COMMIT_MESSAGE="$COMMIT_MESSAGE Pubs(${PUBS_NEW_HASH:0:7})"
          UPDATES_FOUND=true
        else
          echo "ℹ️  No Publications updates found."
        fi
        
        # Commit and push if updates were found
        if [ "$UPDATES_FOUND" = true ]; then
          echo "🚀 Updates found! Committing and pushing changes..."
          git commit -m "$COMMIT_MESSAGE"
          git push origin minimal-mistakes
          echo "✅ Website will be rebuilt with latest data!"
        else
          echo "ℹ️  No updates found. Website is up to date."
        fi
