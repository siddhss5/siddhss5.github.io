  description: 'In this work, we explore user preferences for different modes of autonomy
    for robot-assisted feeding given perceived error risks and also analyze the effect
    of input modalities on technology acceptance.


    Specifically, we tested:

    * Speed (Fast vs. Slow)

    * Interface (Web-based vs. Voice-based)

    * Environment (Social vs. Individual)

    * Level of Autonomy: Full vs. Partial vs. Low'
