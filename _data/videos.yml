  description: 'YCB has long been a cornerstone for robotic manipulation and embodied
    AI research. But the original dataset faced limitations: missing assets, low-quality
    scans, and limited physics fidelity.


    In this conversation, Dr. Steve Xie (CEO, Lightwheel) and Prof. Sidd Srinivasa
    (University of Washington, co-founder of YCB) discuss the journey of refreshing
    YCB into Lightwheel-YCB:


    - Recreating 125 high-fidelity, simulation-ready assets (rigid, articulated, and
    deformable)

    - Adding accurate physics properties to shrink the sim-to-real gap

    - Standardizing formats for Isaac Sim, Isaac Lab, and MuJoCo

    - Building a stronger foundation for benchmarking and embodied AI research


    Together, they explore the past, present, and future of YCB — and how Lightwheel-YCB
    enables researchers to build realistic scenes, design complex tasks, and accelerate
    progress from simulation to reality.'
